#cloud-config
# cloud-init-backend.yaml
# Starts a simple Python HTTP service on port 8080 to simulate a backend dependency.
# vm-app will test connectivity against this service during fault injection exercises.

package_update: true
packages:
  - python3
  - netcat-openbsd

write_files:
  - path: /opt/backend/app.py
    permissions: "0755"
    content: |
      #!/usr/bin/env python3
      from http.server import BaseHTTPRequestHandler, HTTPServer
      import datetime

      class Handler(BaseHTTPRequestHandler):
          def do_GET(self):
              self.send_response(200)
              self.send_header("Content-Type", "text/plain")
              self.end_headers()
              msg = f"FinBridge backend OK — {datetime.datetime.utcnow().isoformat()}Z\n"
              self.wfile.write(msg.encode())
          def log_message(self, format, *args):
              pass  # suppress default access log noise

      if __name__ == "__main__":
          server = HTTPServer(("0.0.0.0", 8080), Handler)
          print("Backend service listening on port 8080")
          server.serve_forever()

  - path: /etc/systemd/system/backend.service
    permissions: "0644"
    content: |
      [Unit]
      Description=FinBridge Mock Backend Service
      After=network.target

      [Service]
      ExecStart=/usr/bin/python3 /opt/backend/app.py
      Restart=always
      RestartSec=3
      User=nobody

      [Install]
      WantedBy=multi-user.target

runcmd:
  - systemctl daemon-reload
  - systemctl enable backend
  - systemctl start backend
